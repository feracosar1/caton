[build]
  base    = "web"
  command = "npm run build"
  publish = "dist"

# Proxy al servidor veedor en Azure VM
# El browser llama /api/veedor/* (HTTPS), Netlify lo reenvía al VM (HTTP interno)
[[redirects]]
  from   = "/api/veedor/*"
  to     = "https://veedor-api.numa.la/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
