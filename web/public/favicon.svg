<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo verde -->
  <rect width="64" height="64" rx="12" fill="#0F3D2E"/>

  <!-- Triángulo dorado (el ojo que todo lo ve) -->
  <polygon points="32,7 57,51 7,51" fill="none" stroke="#C6A15B" stroke-width="2.8" stroke-linejoin="round"/>

  <!-- Línea base del triángulo con brillo interior -->
  <line x1="7" y1="51" x2="57" y2="51" stroke="#C6A15B" stroke-width="2.8" stroke-linecap="round" opacity="0.3"/>

  <!-- Ojo en el centro del triángulo -->
  <!-- Párpado superior -->
  <path d="M19,36 Q32,24 45,36" fill="none" stroke="#C6A15B" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Párpado inferior -->
  <path d="M19,36 Q32,46 45,36" fill="none" stroke="#C6A15B" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Iris -->
  <circle cx="32" cy="36" r="7.5" fill="none" stroke="#C6A15B" stroke-width="2"/>

  <!-- Pupila rellena -->
  <circle cx="32" cy="36" r="4" fill="#C6A15B"/>

  <!-- Brillo de la pupila -->
  <circle cx="34.5" cy="33.5" r="1.4" fill="#0F3D2E" opacity="0.5"/>

  <!-- Destellos alrededor del ojo (rayos dorados) -->
  <line x1="32" y1="7" x2="32" y2="3" stroke="#C6A15B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="57" y1="51" x2="60" y2="54" stroke="#C6A15B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="7" y1="51" x2="4" y2="54" stroke="#C6A15B" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
