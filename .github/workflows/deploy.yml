name: Deploy to Azure VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 20.84.48.138
          username: azureuser
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e
            cd ~/caton

            # Actualizar código
            git pull origin main

            # Instalar dependencias nuevas si hay cambios en package.json
            npm install --omit=dev

            # Reiniciar proceso
            pm2 restart caton || pm2 start veedor-server.mjs --name caton
            pm2 save

            echo "Deploy OK — $(date)"
